site_name: super_otonom v7
site_description: Institutional-grade crypto trading system with Basel III/FRTB risk management
site_url: https://kayi61.github.io/super_otonom_v7/
repo_url: https://github.com/kayi61/super_otonom_v7
repo_name: kayi61/super_otonom_v7

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: ["."]
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            docstring_style: google

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - tables

nav:
  - Home: index.md
  - Getting Started:
      - Onboarding: onboarding.md
      - Architecture: architecture.md
  - API Reference:
      - Risk Engine: api/risk-engine.md
      - RiskConfig: api/config.md
      - VaR Models: api/var-models.md
      - CVaR Models: api/cvar-models.md
      - EVT (POT): api/evt.md
      - Stressed VaR: api/stressed-var.md
      - VaR Backtest: api/var-backtest.md
      - Pre-trade Gate: api/pre-trade-gate.md
      - Position Sizing: api/position-sizer.md
  - Operations:
      - Risk Methodology: RISK_METHODOLOGY.md
      - Risk Appetite: RISK_APPETITE.md
      - Audit Checklist: AUDIT.md
      - DR / BCP: DR_BCP.md
      - Runbook: RUNBOOK.md
      - SLO: SLO.md
  - Changelog: CHANGELOG.md
