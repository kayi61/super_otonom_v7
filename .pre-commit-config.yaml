# Yerel: pip install pre-commit && pre-commit install
# Tam regresyon (isteğe bağlı): pre-commit install --hook-type pre-push
# Commit öncesi: ruff (staj dosyalar) + ruff format
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
        files: ^(super_otonom|tests)/
      - id: ruff-format
        types_or: [python, pyi]
        files: ^(super_otonom|tests)/

  - repo: local
    hooks:
      - id: pytest-full-tests
        name: pytest full tests/ (Aşama 5 — push öncesi)
        entry: python -m pytest tests/ -q --tb=short
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
