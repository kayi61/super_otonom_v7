[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "super_otonom"
version = "7.0.0"
description = "Kurumsal seviye kripto trading sistemi"
requires-python = ">=3.10"
dependencies = [
    "ccxt>=4.0.0",
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "scikit-learn>=1.3.0",
    "joblib>=1.3.0",
    "python-dotenv>=1.0.0",
    "prometheus-client>=0.19.0",
]

[project.optional-dependencies]
dev = [
    "pre-commit>=3.5.0",
    "hypothesis>=6.100",
    "mutmut>=2.4.0,<3",
    "pytest>=8.0",
    "pytest-cov>=4.0",
    "pytest-xdist>=3.5",
    "ruff>=0.8.0",
]
lstm = ["torch>=2.0.0"]

[project.scripts]
super-otonom = "super_otonom.main_loop:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["super_otonom*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-q"
markers = [
    "hypothesis: property-based veya stateful Hypothesis testleri",
]

[tool.ruff]
target-version = "py310"
line-length = 100
src = ["super_otonom", "tests"]

[tool.ruff.lint]
# E402: modül docstring + from __future__ sonrası import sırası (mevcut stil)
# E501: satır uzunluğu — aşamalı temizliğe bırakıldı
ignore = ["E402", "E501"]
select = ["E", "F", "I", "W"]

[tool.coverage.run]
source = ["super_otonom"]
branch = true
omit = [
    "*/__init__.py",
    # Skorlama ağırlıkları: birim test maliyeti yüksek; toplam eşiği için dışlama
    "*/signal_quality_scorer.py",
    "*/correlation_manager.py",
    "*/ml_client.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = false

# Mutation testing (mutmut 2.x). Odak: risk / sermaye / ontology / pre-trade.
# Skor: mutmut results — hedef hayatta kalan <%20 (öldürme >%80). Ayrıntı: .github/workflows/mutation.yml
[tool.mutmut]
paths_to_mutate = [
    "super_otonom/risk_manager.py",
    "super_otonom/capital_engine.py",
    "super_otonom/risk_ontology.py",
    "super_otonom/pre_trade_gate.py",
]
tests_dir = "tests/"
runner = "python -m pytest -x -q --tb=no"
