# ═══════════════════════════════════════════════════════
#  SUPER OTONOM v7 — Docker Compose Stack
# ═══════════════════════════════════════════════════════
# go_bridge: varsayılan "docker compose up" ile başlamaz (çift Binance WS önlenir).
# Tekrar açmak: docker compose --profile go-ws-bridge up -d go_bridge
#
# Parola / DB: compose içinde sabit şifre yok — proje kökündeki .env (bkz. .env.template).
#
# Ag guvenligi: Postgres/Vault/Grafana dis porta acilmaz (yalnizca bot_network).
# Yerel UI: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# TLS:      Uretimde ZORUNLU — scripts/gen_internal_tls.ps1 + docker-compose.tls.yml (README § Docker)
# Vault:    vault-init (root, tek sefer) → vault UID 100 non-root + cap_drop ALL
#
# HA (audit 5): tek host, tek bot instance (container_name); active-passive / multi-AZ yok.
# Kurumsal HA iddiasi yapilmaz — DR/yedek: docs/DR_BCP.md, fastrun: scripts/fastrun_ha.cmd
#
# Clock skew (audit 6): bot_clock_skew_* metrik + Prometheus alert; host NTP best-effort sonda.
# fastrun: scripts/fastrun_clock_skew.cmd
#
# Package topology (audit 7): ~100+ düz super_otonom/*.py; yalnizca pipelines/ alt paket.
# Manifest: data/package_topology_manifest.json — fastrun: scripts/fastrun_package_topology.cmd
#
# BotEngine god class (audit 8): ~1000+ LOC tek sinif; LOC manifest + tavan.
# fastrun: scripts/fastrun_bot_engine_topology.cmd
#
# Test layout (audit 9): super_otonom/test_*.py repoda; wheel'e girmez (build_py exclude).
# fastrun: scripts/fastrun_test_layout.cmd
#
# TWAP/VWAP execution (audit 10): VWAP sinyal (hft_signal_engine); TWAP metadata only;
# algo child-order yurutme yok — TradeExecutor tek limit/market. fastrun: scripts/fastrun_execution_topology.cmd
#
# VaR / CVaR (audit 11): faz-24 portfolio_risk_engine (param/hist/MC/CVaR); canli tick risk_ontology yuzdelik.
# Rejim/likidite/stres gridi yok. fastrun: scripts/fastrun_var_topology.cmd

services:

  # ───────────────────────────────────────
  # ANA BOT
  # Canlı emir: DRY_RUN=false, PAPER_MODE=false, LIVE_CONFIRM=YES; API anahtarları Vault KV
  # ───────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: super_otonom_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DRY_RUN=${DRY_RUN:-true}
      - PAPER_MODE=${PAPER_MODE:-true}
      - LIVE_CONFIRM=${LIVE_CONFIRM:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-text}
      # Bot icinde localhost degil vault servisi (host VAULT_ADDR compose'u bozmasin)
      - VAULT_ADDR=http://vault:8200
      - VAULT_ROLE_ID=${VAULT_ROLE_ID:-}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID:-}
      - VAULT_MOUNT=${VAULT_MOUNT:-secret}
      - VAULT_BASE_PATH=${VAULT_BASE_PATH:-trading}
      - SECRETS_VAULT_ONLY=${SECRETS_VAULT_ONLY:-}
      - SECRETS_VAULT_ONLY_AUTO=${SECRETS_VAULT_ONLY_AUTO:-true}
      - METRICS_PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - TIMESCALE_HOST=${TIMESCALE_HOST:-timescaledb}
      - TIMESCALE_JOURNAL_MIRROR=${TIMESCALE_JOURNAL_MIRROR:-0}
      - TIMESCALE_USER=${POSTGRES_USER:-superotonom}
      - TIMESCALE_PASSWORD=${POSTGRES_PASSWORD}
      - TIMESCALE_DB=${POSTGRES_DB:-trading}
      - WS_ENABLED=${WS_ENABLED:-true}
      - WS_MTF_REFRESH_SEC=${WS_MTF_REFRESH_SEC:-300}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      vault:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/metrics', timeout=8).read(1)\"",
        ]
      interval: 15s
      timeout: 12s
      retries: 5
      start_period: 180s
    networks:
      - bot_network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ───────────────────────────────────────
  # GO REDIS BRIDGE (WebSocket → Redis) — profile: go-ws-bridge
  # ───────────────────────────────────────
  go_bridge:
    profiles:
      - go-ws-bridge
    build:
      context: ./go_service
      dockerfile: Dockerfile
    container_name: super_otonom_go_bridge
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REDIS_KLINE_TTL_SECONDS=${REDIS_KLINE_TTL_SECONDS:-900}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bot_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ───────────────────────────────────────
  # REDIS (state, cache, veri köprüsü)
  # ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: super_otonom_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - bot_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ───────────────────────────────────────
  # PROMETHEUS
  # ───────────────────────────────────────
  alert_telegram:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: super_otonom_alert_telegram
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - VAULT_ADDR=http://vault:8200
      - ALERT_TELEGRAM_PORT=8081
    command: ["python", "-m", "super_otonom.alertmanager_telegram_bridge"]
    depends_on:
      vault:
        condition: service_started
    networks:
      - bot_network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: super_otonom_alertmanager
    restart: unless-stopped
    environment:
      # Köprü adresi (bot WEBHOOK_URL / ALERT_WEBHOOK_URL ile karıştırılmaz — alert_manager.py)
      WEBHOOK_URL: ${ALERTMANAGER_WEBHOOK_URL:-${WEBHOOK_URL:-http://alert_telegram:8081/alert}}
    volumes:
      - ./docker/alertmanager.yml:/etc/alertmanager/alertmanager.base.yml:ro
      - ./docker/alertmanager-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      alert_telegram:
        condition: service_started
    networks:
      - bot_network

  prometheus:
    image: prom/prometheus:latest
    container_name: super_otonom_prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - alertmanager
      - alert_telegram
    networks:
      - bot_network
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  # ───────────────────────────────────────
  # GRAFANA
  # ───────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: super_otonom_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - bot_network

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: super_otonom_timescaledb
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-superotonom}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-trading}
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - bot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Init: volume izinleri (root); ana vault servisi non-root calisir.
  vault-init:
    image: hashicorp/vault:latest
    container_name: super_otonom_vault_init
    user: "0:0"
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mkdir -p /vault/data
        chown -R 100:100 /vault/data
        chmod 750 /vault/data
    volumes:
      - vault_data:/vault/data
    networks:
      - bot_network

  vault:
    image: hashicorp/vault:latest
    container_name: super_otonom_vault
    restart: unless-stopped
    user: "100:100"
    environment:
      - SKIP_SETCAP=true
      - VAULT_ADDR=http://127.0.0.1:8200
    cap_drop:
      - ALL
    cap_add:
      - IPC_LOCK
    entrypoint: ["/bin/sh", "/vault-entrypoint.sh"]
    volumes:
      - ./docker/vault.hcl:/vault/config/vault.hcl:ro
      - ./docker/vault-entrypoint.sh:/vault-entrypoint.sh:ro
      - vault_data:/vault/data
    ports:
      - "127.0.0.1:8200:8200"
    depends_on:
      vault-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8200/v1/sys/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - bot_network

  nginx:
    image: nginx:alpine
    container_name: super_otonom_nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      bot:
        condition: service_healthy
    networks:
      - bot_network

# ═══════════════════════════════════════════════════════
volumes:
  redis_data:
  prometheus_data:
  grafana_data:
  timescale_data:
  vault_data:

networks:
  bot_network:
    driver: bridge
