version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    groups:
      pip-minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker
    # pyproject: requires-python <3.13 — 3.13+ image CD'de pip install'i kirar (PR #94).
    # "3.14*" versions-pattern'i `3.14-slim` tag'ini YAKALAMADI (Dependabot 7da90fc'de
    # kurala ragmen bump'ladi). Saglam cozum: minor+major bump'i tamamen blokla, sadece
    # patch (3.12.x guvenlik) gecsin. Python'u 3.13'e cikarmak icin bu kurali bilincli kaldir.
    ignore:
      - dependency-name: "python"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
