version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    groups:
      pip-minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker
    # pyproject: requires-python <3.13 — 3.14+ image CD'de pip install'i kirar (PR #94)
    ignore:
      - dependency-name: "python"
        versions:
          - "3.13*"
          - "3.14*"
          - "3.15*"
