name: CD (Docker Build + GHCR Push + Staging Deploy)

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve semantic version from git tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          else
            tag="$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || true)"
            version="${tag#v}"
          fi
          if [[ -z "${version}" || "${version}" == "v" ]]; then
            version="0.0.0"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Docker image name (GHCR lowercase)
        id: meta
        shell: bash
        run: |
          repo_lc="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${repo_lc}" >> "$GITHUB_OUTPUT"
          echo "repo=${repo_lc}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (GHCR)
        env:
          VERSION: ${{ steps.version.outputs.version }}
          IMAGE: ${{ steps.meta.outputs.image }}
        shell: bash
        run: |
          set -euo pipefail
          build_date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          short_sha="${GITHUB_SHA:0:12}"
          docker buildx build \
            --push \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:${short_sha}" \
            --build-arg BUILD_VERSION="${VERSION}" \
            --build-arg VCS_REF="${GITHUB_SHA}" \
            --build-arg BUILD_DATE="${build_date}" \
            --build-arg BUILD_SOURCE="https://github.com/${GITHUB_REPOSITORY}" \
            .

  deploy_staging:
    needs: build_and_push
    runs-on: ubuntu-latest
    env:
      BOT_IMAGE_REPO: ${{ needs.build_and_push.outputs.image }}
      BOT_VERSION: ${{ needs.build_and_push.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create CI .env (compose env_file)
        shell: bash
        run: |
          set -euo pipefail
          cp .env.template .env
          sed -i 's/^POSTGRES_PASSWORD=.*/POSTGRES_PASSWORD=ci-compose-validate/' .env
          sed -i 's/^GRAFANA_PASSWORD=.*/GRAFANA_PASSWORD=ci-compose-validate/' .env

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy staging (core: redis, vault, bot)
        shell: bash
        env:
          IMAGE: ${{ needs.build_and_push.outputs.image }}
          VERSION: ${{ needs.build_and_push.outputs.version }}
        run: |
          set -euo pipefail
          repo_lc="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          export BOT_IMAGE_REPO="${repo_lc}"
          export BOT_VERSION="${VERSION}"
          docker compose -f docker-compose.yml -f docker-compose.staging.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.staging.yml pull bot redis vault vault-init
          docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d redis vault-init
          docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d vault bot --no-build --wait --timeout 300
