# CI: kanon drift + hizli gate (ci-quick / fastrun) + PR'da tam pytest + coverage
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kanon-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Kanon drift (src/phases + phase_chain)
        run: python scripts/check_kanon_drift.py

  # Hizli gate — PR'da ilk sinyal (~dakikalar); tam suite degil
  ci-quick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package (dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check super_otonom tests

      - name: Release gate smoke (PROMPT-A12)
        run: python -m pytest -m release_gate -q --tb=short

      - name: PROMPT-1 Sharpe annualize audit
        run: python -m super_otonom.sharpe_audit

      - name: PROMPT-2 Hard safety contract audit
        run: python -m super_otonom.hard_safety_contract

      - name: PROMPT-4 Survivorship disclosure audit
        run: python -m super_otonom.survivorship_audit

      - name: PROMPT-5 Single-host HA audit
        run: python -m super_otonom.ha_audit

      - name: PROMPT-6 Clock skew / NTP disclosure audit
        run: python -m super_otonom.clock_skew_audit

      - name: PROMPT-7 Package topology (god package) audit
        run: python -m super_otonom.package_topology_audit

      - name: PROMPT-8 BotEngine god-class topology audit
        run: python -m super_otonom.bot_engine_audit

      - name: PROMPT-9 Test layout (in-package tests excluded from wheel)
        run: python -m super_otonom.layout_topology_audit --verify-wheel

      - name: PROMPT-10 TWAP/VWAP execution topology audit
        run: python -m super_otonom.execution_topology_audit

      - name: PROMPT-11 VaR / CVaR topology audit
        run: python -m super_otonom.var_topology_audit

      - name: VR-01 VaR single source audit
        run: python scripts/audit_var_source.py

      - name: VR-24 Model validation due-date check
        run: python scripts/check_model_validation_due.py

      - name: VR-25 Risk appetite consistency check
        run: python scripts/risk_appetite_check.py

      - name: Pytest fastrun (5000 gate)
        run: python -m pytest tests -m fastrun -q --tb=short

      - name: Pytest testnet_ci (mock, ag yok)
        env:
          BINANCE_TESTNET: "true"
        run: python -m pytest tests -m testnet_ci -q --tb=short

      - name: Dependency security (pip-audit + SBOM)
        run: |
          python -m pip install --upgrade pip pip-audit>=2.7.0
          python scripts/dependency_security.py --sbom --fail-on critical,high

  go-build:
    needs: [kanon-drift]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Build go_service (Docker go_bridge)
        working-directory: go_service
        run: go mod download && go build -o /tmp/super_otonom_go .

      - name: Build go_redis_bridge
        working-directory: go_redis_bridge
        run: go mod download && go build -o /tmp/go_redis_bridge .

  # PR zorunlu: tam test/ — branch protection'da bu job adini required yapin
  pytest-full:
    needs: [kanon-drift, ci-quick, go-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package (dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest full suite
        run: python -m pytest tests/ -q -n auto --tb=short

  # Tam suite + coverage esigi (Asama 5); pytest-full ile ayni kosu, cov raporu
  coverage:
    needs: [pytest-full]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Coverage: xdist (-n auto) ile pytest-cov birlesimi CI'da toplam %90 esigini dusurebiliyor;
      # tam suite tek surecte olculur (pytest-full job hizli kalir).
      - name: Pytest full suite + coverage
        run: >
          python -m pytest tests/ -q --tb=short
          --cov=super_otonom
          --cov-report=term-missing
          --cov-fail-under=90
