# Faz 2: sürekli entegrasyon — lint + hızlı test + kapsam
# Parametre tarama testleri (on binlerce case) CI’da hariç; yerelde tam: pytest tests/
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kanon-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Kanon drift (src/phases + phase_chain)
        run: python scripts/check_kanon_drift.py

  lint-test:
    needs: kanon-drift
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Release gate smoke (PROMPT-A12)
        run: python -m pytest -m release_gate -q --tb=short

      - name: Ruff
        run: ruff check super_otonom tests

      # Gerçek paket kapsamı (dal dahil) ~%90; sahte %100 yok. Regresyon için taban eşik 90.
      - name: Pytest + coverage (paralel; gerçek toplam; sweep ignore)
        run: >
          pytest tests/ -q -n auto
          --cov=super_otonom
          --cov-report=term-missing
          --ignore=tests/test_sweep_45k_to_50k.py
          --ignore=tests/test_sweep_ext_4500.py
          --ignore=tests/test_sweep_matrix_500.py
          --cov-fail-under=90
