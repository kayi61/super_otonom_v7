# Nightly VaR backtest — Kupiec POF (VR-13)
# Runs at 02:00 UTC daily. Failure (p_value < 0.05) auto-opens a GitHub issue.
name: Nightly Kupiec Backtest

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  kupiec-backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package (dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Kupiec POF backtest
        id: kupiec
        run: |
          if [ ! -f "data/realized_pnl.json" ] || [ ! -f "data/predicted_var.json" ]; then
            echo '{"skipped": true, "reason": "missing data/realized_pnl.json or data/predicted_var.json"}' > kupiec_result.json
            echo "Kupiec backtest skipped: input files missing."
            exit 0
          fi
          python -m super_otonom.risk.var_backtest --json > kupiec_result.json 2>&1

      - name: Upload backtest result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kupiec-result
          path: kupiec_result.json

      - name: Check result and open issue on failure
        if: always() && steps.kupiec.outcome == 'failure'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let body = 'Kupiec POF backtest failed — VaR model may need recalibration.\n\n';
            try {
              const raw = fs.readFileSync('kupiec_result.json', 'utf8');
              body += '```json\n' + raw + '\n```\n';
            } catch (e) {
              body += 'Could not read result file.\n';
            }
            body += '\n**Action:** Review VaR model exceedance rate and recalibrate if necessary.';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Kupiec POF backtest FAILED — VaR model review required',
              body: body,
              labels: ['risk', 'automated', 'var-backtest'],
            });

      - name: Run backtest unit tests
        if: always()
        run: python -m pytest tests/risk/test_var_backtest_vr13.py -q --tb=short
