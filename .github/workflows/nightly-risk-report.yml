# Nightly risk report generation (VR-22)
# Runs at 23:55 UTC daily. Generates Markdown risk report + commits to repo.
name: Nightly Risk Report

on:
  schedule:
    - cron: "55 23 * * *"
  workflow_dispatch:

jobs:
  risk-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package (dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate daily risk report
        run: python scripts/generate_daily_risk_report.py --date today --out docs/risk_reports/

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: risk-report-${{ github.run_id }}
          path: docs/risk_reports/

      - name: Check model validation due dates
        id: model-check
        continue-on-error: true
        run: python scripts/check_model_validation_due.py --json

      - name: Open issue on overdue models
        if: steps.model-check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Model validation overdue — review required',
              body: 'One or more risk models are past their validation due date.\n\nRun `python scripts/check_model_validation_due.py` for details.',
              labels: ['risk', 'automated', 'model-governance'],
            });
