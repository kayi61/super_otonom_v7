# İsteğe bağlı mutation testi (mutmut 2.x). Ana CI’dan ayrı — süre uzun olabilir.
# Hedef: risk_manager, bot_engine, main_loop (sırayla veya --paths-to-mutate ile).
# Skor: yerelde `mutmut results` — hedef hayatta kalan <%20 (öldürme >%80).
name: Mutation testing

on:
  workflow_dispatch:

jobs:
  mutmut-risk:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Mutmut (risk_manager)
        run: mutmut run --paths-to-mutate super_otonom/risk_manager.py --CI
      - name: Results
        run: mutmut results

  mutmut-core:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Mutmut (bot_engine)
        run: mutmut run --paths-to-mutate super_otonom/bot_engine.py --CI
      - name: Results
        run: mutmut results

  mutmut-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Mutmut (main_loop)
        run: mutmut run --paths-to-mutate super_otonom/main_loop.py --CI
      - name: Results
        run: mutmut results
