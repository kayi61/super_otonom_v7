# Mutation testing (mutmut 2.x) — risk / sermaye / ontology / pre-trade.
# Hedef pytest seti: scripts/mutmut_risk_targets.py (tum tests/ DEGIL — mutant basina saat surer).
# cancel-in-progress: false — 3h job; ardışık push eski kosuyu iptal etmesin.
name: Mutation Testing

on:
  pull_request:
    paths:
      - "super_otonom/risk_manager.py"
      - "super_otonom/capital_engine.py"
      - "super_otonom/risk_ontology.py"
      - "super_otonom/pre_trade_gate.py"
      - "super_otonom/risk/var_models.py"
      - "super_otonom/risk/cvar_models.py"
      - "super_otonom/risk/stressed_var.py"
      - "super_otonom/risk/var_backtest.py"
      - ".github/workflows/mutation.yml"
      - "pyproject.toml"
      - "scripts/mutmut_gate.py"
      - "scripts/mutmut_risk_targets.py"
      - "tests/test_risk_mutation_targets.py"
      - "tests/test_risk_ontology_mutation.py"
      - "tests/test_risk_manager_mutation.py"
      - "tests/branch/test_risk_manager_branch_matrix.py"
      - "tests/risk/test_var_models_vr02.py"
      - "tests/risk/test_cornish_fisher_vr03.py"
      - "tests/risk/test_cvar_vr04.py"
      - "tests/risk/test_stressed_var_vr11.py"
      - "tests/risk/test_var_backtest_vr13.py"
      - "tests/risk/test_christoffersen_vr14.py"
      - "tests/risk/test_basel_traffic_light_vr15.py"
  workflow_dispatch:

concurrency:
  group: mutation-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  changes:
    name: "Mutation — degisen dosyalar"
    runs-on: ubuntu-latest
    outputs:
      risk_manager: ${{ steps.filter.outputs.risk_manager }}
      capital_engine: ${{ steps.filter.outputs.capital_engine }}
      risk_ontology: ${{ steps.filter.outputs.risk_ontology }}
      pre_trade_gate: ${{ steps.filter.outputs.pre_trade_gate }}
      var_models: ${{ steps.filter.outputs.var_models }}
      cvar_models: ${{ steps.filter.outputs.cvar_models }}
      stressed_var: ${{ steps.filter.outputs.stressed_var }}
      var_backtest: ${{ steps.filter.outputs.var_backtest }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            risk_manager:
              - 'super_otonom/risk_manager.py'
              - 'scripts/mutmut_risk_targets.py'
              - 'tests/test_risk_manager_mutation.py'
              - 'tests/test_risk_mutation_targets.py'
              - 'tests/branch/test_risk_manager_branch_matrix.py'
            capital_engine:
              - 'super_otonom/capital_engine.py'
            risk_ontology:
              - 'super_otonom/risk_ontology.py'
              - 'tests/test_risk_ontology_mutation.py'
              - 'tests/test_risk_mutation_targets.py'
              - 'scripts/mutmut_risk_targets.py'
            pre_trade_gate:
              - 'super_otonom/pre_trade_gate.py'
            var_models:
              - 'super_otonom/risk/var_models.py'
              - 'tests/risk/test_var_models_vr02.py'
              - 'tests/risk/test_cornish_fisher_vr03.py'
            cvar_models:
              - 'super_otonom/risk/cvar_models.py'
              - 'tests/risk/test_cvar_vr04.py'
            stressed_var:
              - 'super_otonom/risk/stressed_var.py'
              - 'tests/risk/test_stressed_var_vr11.py'
            var_backtest:
              - 'super_otonom/risk/var_backtest.py'
              - 'tests/risk/test_var_backtest_vr13.py'
              - 'tests/risk/test_christoffersen_vr14.py'
              - 'tests/risk/test_basel_traffic_light_vr15.py'

  mutation-risk-manager:
    name: "Mutation — risk_manager.py (eşik: %80)"
    needs: changes
    if: needs.changes.outputs.risk_manager == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Bağımlılıkları yükle
        run: |
          pip install "mutmut>=2.4,<3"
          pip install -e ".[dev]"
      - name: Hedef test listesi
        id: targets
        run: echo "paths=$(python scripts/mutmut_risk_targets.py risk_manager)" >> "$GITHUB_OUTPUT"
      - name: Coverage bağlamı (mutmut --use-coverage önkoşul)
        run: |
          python -m pytest ${{ steps.targets.outputs.paths }} -q \
            --cov=super_otonom.risk_manager \
            --cov-context=test \
            --cov-report=
      - name: Mutation testi çalıştır
        run: |
          mutmut run \
            --paths-to-mutate super_otonom/risk_manager.py \
            --use-coverage \
            --disable-mutation-types=string \
            --runner "python -m pytest ${{ steps.targets.outputs.paths }} -x -q --tb=no" \
            --CI
          python scripts/mutmut_gate.py --min 80

