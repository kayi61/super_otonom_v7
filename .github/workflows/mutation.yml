name: Mutation Testing

on:
  push:
    paths:
      - "super_otonom/risk_manager.py"
      - "super_otonom/capital_engine.py"
      - "super_otonom/risk_ontology.py"
      - "super_otonom/pre_trade_gate.py"
  pull_request:
    paths:
      - "super_otonom/risk_manager.py"
      - "super_otonom/capital_engine.py"
      - "super_otonom/risk_ontology.py"
      - "super_otonom/pre_trade_gate.py"
  workflow_dispatch:

jobs:
  mutation-risk-manager:
    name: "Mutation — risk_manager.py (eşik: %80)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Bağımlılıkları yükle
        run: pip install -e ".[dev]" mutmut pytest pytest-xdist
      - name: Mutation testi çalıştır
        run: |
          mutmut run \
            --paths-to-mutate super_otonom/risk_manager.py \
            --runner "python -m pytest tests/ -x -q --tb=no" \
            --CI
          SCORE=$(mutmut results | grep -oP '\d+\.\d+(?=%)' | tail -1)
          echo "Mutation score: $SCORE%"
          python3 -c "
          import sys
          score = float('${SCORE}' or '0')
          if score < 80:
              print(f'FAIL: mutation score {score:.1f}% < 80%')
              sys.exit(1)
          print(f'PASS: mutation score {score:.1f}% >= 80%')
          "

  mutation-capital-engine:
    name: "Mutation — capital_engine.py (eşik: %80)"
