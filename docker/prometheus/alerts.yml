groups:
  - name: super_otonom_bot
    interval: 30s
    rules:
      - alert: BotCircuitBreakerOpen
        expr: max(bot_circuit_breaker_open) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Circuit breaker acik (en az bir sembol)"
          description: "max(bot_circuit_breaker_open)={{ $value | printf \"%.0f\" }}"

      - alert: BotDrawdownHigh
        expr: bot_peak_drawdown_pct > 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Bot peak drawdown > 15%"
          description: "peak_drawdown_pct={{ $value | printf \"%.2f\" }}%"

      - alert: BotEmergencyStop
        expr: bot_emergency_stop == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Bot emergency stop aktif"

      - alert: BotOrderErrors
        expr: increase(bot_order_errors_total[5m]) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Emir hatalari artiyor"
          description: "{{ $value | printf \"%.0f\" }} yeni hata (5dk)"

      - alert: BotWsReconnectStorm
        expr: increase(bot_ws_reconnects_total[10m]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "WebSocket sik yeniden baglaniyor"
          description: "{{ $value | printf \"%.0f\" }} reconnect (10dk)"

      - alert: BotVaultDown
        expr: bot_dependency_up{name="vault"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Vault erisilemiyor"

      - alert: BotTimescaleDown
        expr: bot_dependency_up{name="timescale"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "TimescaleDB baglantisi yok"

      - alert: BotClockSkewHigh
        expr: bot_clock_skew_abs_ms >= 500
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Borsa-yerel saat farki yuksek"
          description: "abs_skew_ms={{ $value | printf \"%.0f\" }} (esik CLOCK_SKEW_WARN_MS)"

      - alert: BotClockSkewCritical
        expr: bot_clock_skew_abs_ms >= 2000
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Borsa-yerel saat farki kritik"
          description: "abs_skew_ms={{ $value | printf \"%.0f\" }} — mum/imza riski"

      - alert: BotKupiecModelInvalid
        expr: bot_kupiec_pvalue < 0.05 and bot_kupiec_pvalue > 0
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Kupiec POF backtest basarisiz — VaR modeli gozden gecirilmeli"
          description: "kupiec_pvalue={{ $value | printf \"%.4f\" }}"

      - alert: BotChristoffersenCluster
        expr: bot_christoffersen_ind_pvalue < 0.05 and bot_christoffersen_ind_pvalue > 0
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Christoffersen independence basarisiz — VaR exceedance kumelenmesi tespit edildi"
          description: "christoffersen_ind_pvalue={{ $value | printf \"%.4f\" }}"

      - alert: BotVaRTrafficLightYellow
        expr: bot_var_traffic_light == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Basel traffic light YELLOW — VaR modeline sermaye ek yuklemesi uygulanmali"
          description: "exceedances={{ $values.bot_var_traffic_light_exceedances | printf \"%.0f\" }}, capital_addon={{ $values.bot_var_traffic_light_capital_addon | printf \"%.2f\" }}"

      - alert: BotVaRTrafficLightRed
        expr: bot_var_traffic_light == 2
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Basel traffic light RED — VaR modeli reddedildi, acil gozden gecirme gerekli"
          description: "exceedances={{ $values.bot_var_traffic_light_exceedances | printf \"%.0f\" }}"

      - alert: BotStressLossHigh
        expr: bot_stress_worst_scenario_pnl_pct < -15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Stres senaryosu kaybi > %15 NAV"
          description: "worst_pnl_pct={{ $value | printf \"%.2f\" }}%"

      - alert: BotPnLDriftHigh
        expr: bot_pnl_attribution_health == 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "PnL attribution drift tespit edildi — aciklanamayan PnL > 10 bps"
          description: "unexplained_pct={{ $values.bot_pnl_unexplained_pct | printf \"%.6f\" }}"

      - alert: BotPreTradeVarGateReject
        expr: avg_over_time(bot_pre_trade_var_gate_passed[15m]) < 0.5
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Pre-trade VaR gate islerin >%50 sini reddediyor"
          description: "approval_rate={{ $value | printf \"%.2f\" }} (15dk ortalamasi)"

      - alert: BotVarCapBindingRate
        expr: avg_over_time(bot_position_sizer_var_cap_active[15m]) > 0.8
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "VaR cap islerin >%80 inde binding — Kelly büyüklüğü sürekli kırpılıyor"
          description: "binding_rate={{ $value | printf \"%.2f\" }} (15dk ortalamasi)"

      - alert: BotHostNtpNotSynchronized
        expr: bot_host_ntp_synchronized == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host NTP senkron degil (sonda)"
          description: "w32tm/timedatectl — chrony kurulumu repoda yok"

      # ── VR-21: Prometheus VaR/CVaR Full Suite Alerts ──────────────────────

      - alert: BotVaRApproachingLimit
        expr: bot_var_limit_utilisation{level="var_99"} > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "VaR 99% limite yaklasiyor (>%80 kullanim)"
          description: "var_limit_utilisation={{ $value | printf \"%.2f\" }} (1.0 = limit)"

      - alert: BotVaRLimitBreach
        expr: bot_var_limit_utilisation{level="var_99"} >= 1.0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "VaR 99% limiti asildi — kill-switch kontrolu aktif"
          description: "var_limit_utilisation={{ $value | printf \"%.2f\" }}"

      - alert: BotCVaRLimitBreach
        expr: bot_var_limit_utilisation{level="cvar_975"} >= 1.0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "CVaR 97.5% limiti asildi"
          description: "cvar_limit_utilisation={{ $value | printf \"%.2f\" }}"

      - alert: BotModelDispersionHigh
        expr: bot_var_model_dispersion_pct > 0.5
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "VaR model dispersion > %50 — modeller anlamlı farklilik gosteriyor"
          description: "model_dispersion={{ $value | printf \"%.4f\" }}"

      - alert: BotPnLUnexplainedHigh
        expr: bot_pnl_unexplained_pct > 0.0015
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Aciklanamayan PnL > 15 bps — kaynak arastirmasi gerekli"
          description: "unexplained_pct={{ $value | printf \"%.6f\" }}"

      - alert: BotStressedVaRApproachingLimit
        expr: bot_var_limit_utilisation{level="stressed_var"} > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Stressed VaR limite yaklasiyor (>%80 kullanim)"
          description: "stressed_var_utilisation={{ $value | printf \"%.2f\" }}"

      - alert: BotLVaRLimitBreach
        expr: bot_var_limit_utilisation{level="lvar"} >= 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LVaR/NAV limiti asildi"
          description: "lvar_utilisation={{ $value | printf \"%.2f\" }}"
