groups:
  - name: super_otonom_bot
    interval: 30s
    rules:
      - alert: BotCircuitBreakerOpen
        expr: max(bot_circuit_breaker_open) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Circuit breaker acik (en az bir sembol)"
          description: "max(bot_circuit_breaker_open)={{ $value | printf \"%.0f\" }}"

      - alert: BotDrawdownHigh
        expr: bot_peak_drawdown_pct > 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Bot peak drawdown > 15%"
          description: "peak_drawdown_pct={{ $value | printf \"%.2f\" }}%"

      - alert: BotEmergencyStop
        expr: bot_emergency_stop == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Bot emergency stop aktif"

      - alert: BotOrderErrors
        expr: increase(bot_order_errors_total[5m]) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Emir hatalari artiyor"
          description: "{{ $value | printf \"%.0f\" }} yeni hata (5dk)"

      - alert: BotWsReconnectStorm
        expr: increase(bot_ws_reconnects_total[10m]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "WebSocket sik yeniden baglaniyor"
          description: "{{ $value | printf \"%.0f\" }} reconnect (10dk)"

      - alert: BotVaultDown
        expr: bot_dependency_up{name="vault"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Vault erisilemiyor"

      - alert: BotTimescaleDown
        expr: bot_dependency_up{name="timescale"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "TimescaleDB baglantisi yok"

      - alert: BotClockSkewHigh
        expr: bot_clock_skew_abs_ms >= 500
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Borsa-yerel saat farki yuksek"
          description: "abs_skew_ms={{ $value | printf \"%.0f\" }} (esik CLOCK_SKEW_WARN_MS)"

      - alert: BotClockSkewCritical
        expr: bot_clock_skew_abs_ms >= 2000
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Borsa-yerel saat farki kritik"
          description: "abs_skew_ms={{ $value | printf \"%.0f\" }} — mum/imza riski"

      - alert: BotHostNtpNotSynchronized
        expr: bot_host_ntp_synchronized == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host NTP senkron degil (sonda)"
          description: "w32tm/timedatectl — chrony kurulumu repoda yok"
