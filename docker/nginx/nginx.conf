events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Reverse-proxy rate limiting (PROMPT-01)
    limit_req_zone $binary_remote_addr zone=bot_general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=grafana_ui:10m rate=5r/s;
    limit_req_status 429;

    server {
        listen 80;
        server_name _;

        location / {
            limit_req zone=bot_general burst=20 nodelay;
            set $bot_upstream bot:8000;
            proxy_pass http://$bot_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /grafana/ {
            limit_req zone=grafana_ui burst=10 nodelay;
            set $gf_upstream grafana:3000;
            proxy_pass http://$gf_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
